<!DOCTYPE html>
<html lang="ckb" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>یا حکیم — وتار</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Naskh+Arabic:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="data.js"></script>
<style>
:root{--bg:#f4f6fb;--surface:#fff;--surface2:#f0f2f8;--border:#d4d9ea;--border2:#e4e8f4;--accent:#2b72e8;--accent2:#1e8a5e;--text:#1a1e2e;--text-muted:#5a6480;--text-dim:#9aa0b8;--tag-bg:#dce8fc;--tag-text:#2b72e8;--pill-bg:#d4f0e4;--pro-bg:#dbeafe;--pro-border:#93c5fd;--pro-text:#1e40af;--shadow:0 2px 8px #0000001a;--sp-bg:#ede0ff;--sp-text:#6b21a8;--sp-border:#c4a0f0;}
html.dark{--bg:#0f1117;--surface:#171b26;--surface2:#1e2333;--border:#2a3045;--border2:#1e2640;--accent:#5b9cf6;--accent2:#7ec8a4;--text:#e8eaf0;--text-muted:#7a839e;--text-dim:#4a5270;--tag-bg:#1e2d45;--tag-text:#7eb8f7;--pill-bg:#1a2e22;--pro-bg:#1a2840;--pro-border:#2a4870;--pro-text:#7eb8f7;--shadow:0 2px 8px #00000040;--sp-bg:#2a1f3d;--sp-text:#c4a0f0;--sp-border:#4a2f6d;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:'Noto Naskh Arabic',serif;min-height:100vh;direction:rtl;transition:background .25s,color .25s;}

/* HEADER */
header{padding:10px 20px;border-bottom:1px solid var(--border);background:var(--surface);position:sticky;top:0;z-index:100;box-shadow:var(--shadow);}
.hdr-row{display:flex;align-items:center;justify-content:space-between;gap:10px;}
.hdr-left{display:flex;align-items:center;gap:9px;min-width:0;flex:1;overflow:hidden;}
.yh-logo{width:32px;height:32px;flex-shrink:0;border-radius:6px;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,#7c3a1a 0%,#b5601f 40%,#8b2e0a 70%,#5c1e06 100%);box-shadow:0 1px 4px #00000060;}
.yh-logo svg{width:22px;height:22px;}
.yh-link{display:inline-flex;align-items:center;gap:8px;text-decoration:none;color:inherit;}
.yh-name{font-size:1rem;font-weight:700;color:var(--text);white-space:nowrap;}
.hdr-sep{color:var(--border);padding:0 4px;flex-shrink:0;}
.hdr-title{font-size:.9rem;font-weight:600;color:var(--text-muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.hdr-controls{display:flex;align-items:center;gap:6px;flex-shrink:0;}
.icon-btn{background:var(--surface2);border:1px solid var(--border);border-radius:8px;cursor:pointer;color:var(--text-muted);padding:7px 10px;transition:all .2s;font-family:'Noto Naskh Arabic',serif;display:inline-flex;align-items:center;gap:5px;white-space:nowrap;font-size:.82rem;line-height:1;text-decoration:none;}
.icon-btn:hover{border-color:var(--accent);color:var(--accent);}

/* ARTICLE LAYOUT */
.art-wrap{max-width:740px;margin:0 auto;padding:28px 20px 60px;}
.art-meta-bar{display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:18px;}
.art-lvl-pill{display:inline-flex;align-items:center;gap:4px;font-size:.73rem;font-weight:600;padding:3px 10px;border-radius:20px;}
.art-lvl-pill.patient{background:var(--pill-bg);color:var(--accent2);}
.art-lvl-pill.professional{background:var(--pro-bg);color:var(--pro-text);border:1px solid var(--pro-border);}
.art-sp-pill{display:inline-flex;align-items:center;gap:4px;font-size:.73rem;font-weight:600;padding:3px 10px;border-radius:20px;background:var(--sp-bg);color:var(--sp-text);border:1px solid var(--sp-border);text-decoration:none;}
.art-sp-pill:hover{filter:brightness(1.06);}
.art-date{font-size:.72rem;color:var(--text-dim);}

.art-heading{font-size:1.5rem;font-weight:700;line-height:1.4;margin-bottom:10px;}
.art-synopsis-block{background:var(--surface2);border-right:4px solid var(--sp-border);border-radius:0 10px 10px 0;padding:13px 16px;margin-bottom:22px;font-size:.88rem;color:var(--text-muted);line-height:1.75;}

.art-authors-bar{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:20px;padding-bottom:16px;border-bottom:1px solid var(--border);}
.author-chip{display:inline-flex;align-items:center;gap:7px;background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:7px 12px;}
.author-name{font-size:.84rem;font-weight:600;}
.author-qual{font-size:.71rem;color:var(--text-muted);}

/* ARTICLE BODY */
.art-body{font-size:.93rem;line-height:1.9;color:var(--text-muted);}
.art-body h2{font-size:1.2rem;font-weight:700;color:var(--text);margin:24px 0 10px;}
.art-body h3{font-size:1.05rem;font-weight:700;color:var(--text);margin:20px 0 8px;}
.art-body h4{font-size:.95rem;font-weight:700;color:var(--text);margin:16px 0 6px;}
.art-body p{margin-bottom:12px;}
.art-body ul,.art-body ol{padding-right:22px;margin-bottom:12px;}
.art-body li{margin-bottom:4px;}
.art-body strong{color:var(--text);}
.art-body br{display:block;margin-bottom:6px;}

/* QUOTE */
blockquote.art-quote{border-right:4px solid var(--sp-border);padding:12px 16px;margin:18px 0;background:var(--sp-bg);border-radius:0 8px 8px 0;font-size:.9rem;color:var(--sp-text);font-style:italic;line-height:1.7;}

/* TABLE */
.art-table{width:100%;border-collapse:collapse;margin:14px 0;font-size:.83rem;}
.art-table th{background:var(--surface2);padding:8px 12px;text-align:right;border-bottom:2px solid var(--border);font-weight:700;color:var(--text-muted);}
.art-table td{padding:7px 12px;border-bottom:1px solid var(--border2);color:var(--text-muted);}
.art-table tr:last-child td{border-bottom:none;}

/* TIP */
.article-tip{display:flex;gap:10px;align-items:flex-start;background:var(--pill-bg);border:1px solid var(--accent2);border-radius:8px;padding:10px 14px;margin:14px 0;font-size:.85rem;color:var(--accent2);line-height:1.65;}
.article-tip.professional{background:var(--pro-bg);border-color:var(--pro-border);color:var(--pro-text);}
.article-tip span:first-child{flex-shrink:0;}

/* MEDIA */
.media-section{margin:24px 0;}
.media-section h4{font-size:.9rem;font-weight:700;color:var(--text);margin-bottom:12px;}
.media-embed{border-radius:12px;overflow:hidden;background:var(--surface2);border:1px solid var(--border);}
.media-embed iframe{width:100%;display:block;border:none;}
.media-caption{font-size:.75rem;color:var(--text-dim);padding:8px 12px;text-align:center;}

/* TAGS */
.art-tags-row{display:flex;gap:6px;flex-wrap:wrap;margin-top:28px;padding-top:16px;border-top:1px solid var(--border);}
.art-tag-full{background:var(--surface2);color:var(--text-dim);border:1px solid var(--border);border-radius:4px;padding:3px 9px;font-size:.73rem;}

/* BACK LINK */
.art-back{display:inline-flex;align-items:center;gap:6px;font-size:.82rem;color:var(--accent);text-decoration:none;margin-top:24px;padding:7px 13px;border:1px solid var(--border);border-radius:8px;background:var(--surface2);transition:all .15s;}
.art-back:hover{border-color:var(--accent);background:var(--tag-bg);}

/* NOT FOUND */
.not-found{text-align:center;padding:80px 20px;color:var(--text-muted);}

/* BACK TO TOP */
.btt{position:fixed;bottom:22px;left:22px;background:var(--surface);border:1px solid var(--border);border-radius:10px;color:var(--text-muted);cursor:pointer;padding:9px 11px;opacity:0;pointer-events:none;transition:all .22s;box-shadow:var(--shadow);z-index:50;}
.btt.show{opacity:1;pointer-events:all;}
.btt:hover{border-color:var(--accent);color:var(--accent);}

@media(max-width:600px){.art-wrap{padding:18px 14px 50px;}.art-heading{font-size:1.2rem;}}

/* FOOTER */
.site-footer{background:var(--surface);border-top:1px solid var(--border);padding:18px 20px;text-align:center;margin-top:20px;}
.footer-links{display:flex;justify-content:center;gap:18px;flex-wrap:wrap;margin-bottom:7px;}
.footer-links a{font-size:.8rem;color:var(--text-muted);text-decoration:none;transition:color .15s;}
.footer-links a:hover{color:var(--accent);}
.footer-copy{font-size:.73rem;color:var(--text-dim);}
</style>
</head>

<button class="btt" id="btt" onclick="window.scrollTo({top:0,behavior:'smooth'})">
  <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M8 12V4M4 7l4-4 4 4" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>
</button>

<script>
let isLight=true;
function toggleTheme(){isLight=!isLight;document.documentElement.classList.toggle("dark",!isLight);document.getElementById("themeBtn").textContent=isLight?"🌙":"☀️";}
window.addEventListener("scroll",()=>document.getElementById("btt").classList.toggle("show",window.scrollY>300));

function renderMedia(mediaArr){
  if(!mediaArr||!mediaArr.length) return "";
  return mediaArr.map(m=>{
    if(m.type==="youtube") return `<div class="media-section"><h4>🎬 ڤیدیۆ</h4><div class="media-embed"><iframe src="https://www.youtube.com/embed/${m.id}" height="280" allowfullscreen loading="lazy"></iframe><div class="media-caption">${m.caption||""}</div></div></div>`;
    if(m.type==="soundcloud") return `<div class="media-section"><h4>🎧 دەنگ</h4><div class="media-embed"><iframe src="https://w.soundcloud.com/player/?url=${encodeURIComponent(m.url)}&color=%232b72e8&auto_play=false&hide_related=true&show_comments=false&show_user=true&show_reposts=false&show_teaser=false" height="120" scrolling="no" allow="autoplay"></iframe><div class="media-caption">${m.caption||""}</div></div></div>`;
    return "";
  }).join("");
}

function render(){
  const artId=new URLSearchParams(window.location.search).get("id");
  if(!artId){ document.getElementById("notFound").style.display="block"; return; }
  const art=YH.getArticle(artId);
  if(!art){ document.getElementById("notFound").style.display="block"; return; }

  document.title=`یا حکیم — ${art.title}`;
  document.getElementById("hdrTitle").textContent=art.title.substring(0,45)+(art.title.length>45?"…":"");

  const sp=art.specialty?YH.getSpecialty(art.specialty):null;
  const authors=YH.getAuthorDoctors(artId);
  const lvlLbl=art.level==="patient"?"🙋 بۆ نەخۆش":"🔬 کلینیکی";
  const tags=(art.tags||[]).map(t=>`<span class="art-tag-full">${t}</span>`).join("");
  const authorsHtml=authors.map(d=>`<div class="author-chip"><div><div class="author-name">👨‍⚕️ ${d.name}</div><div class="author-qual">${d.qualifications}</div></div></div>`).join("");
  const spPill=sp?`<a href="specialty.html?sp=${sp.key}" class="art-sp-pill">${sp.icon} ${sp.nameKu}</a>`:"";
  const mediaHtml=renderMedia(art.media||[]);
  const backLink=sp?`specialty.html?sp=${sp.key}`:"index.html";

  document.getElementById("artRoot").innerHTML=`
    <div class="art-wrap">
      <div class="art-meta-bar">
        <span class="art-lvl-pill ${art.level}">${lvlLbl}</span>
        ${spPill}
        <span class="art-date">${art.dateKu}</span>
        <span style="font-size:1.4rem">${art.icon}</span>
      </div>
      <h1 class="art-heading">${art.title}</h1>
      <div class="art-synopsis-block">${art.synopsis}</div>
      ${authorsHtml?`<div class="art-authors-bar">${authorsHtml}</div>`:""}
      <div class="art-body">${art.fullBody||art.body}</div>
      ${mediaHtml}
      ${tags?`<div class="art-tags-row">${tags}</div>`:""}
      <a href="${backLink}" class="art-back">← گەڕانەوە بۆ ${sp?sp.nameKu:"لیستی پزیشکان"}</a>
    </div>`;
}

render();
</script>
